<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <meta
    name="description"
    content="Специальное приложение для Нурсауле ❤️"
  >

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="N❤️B"
  >

  <meta
    name="theme-color"
    content="#02040D"
  >

  <link
    rel="apple-touch-icon"
    href="icons/Icon-192.png?v=6"
  >

  <link
    rel="icon"
    type="image/png"
    href="favicon.png?v=6"
  >

  <link
    rel="manifest"
    href="manifest.json?v=6"
  >

  <title>N❤️B</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #02040D;
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      z-index: 999999;

      width: 100%;
      height: 100%;
      min-height: 100dvh;

      overflow: hidden;
      background: #02040D;

      opacity: 1;

      transition:
        opacity 700ms cubic-bezier(0.22, 1, 0.36, 1),
        visibility 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    #flutter-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #stars {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      opacity: 0;

      animation: starsAppear 900ms ease 120ms forwards;

      pointer-events: none;
    }

    .ambient-glow {
      position: absolute;
      left: 50%;
      top: 46%;

      width: min(82vw, 420px);
      height: min(82vw, 420px);

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(166, 74, 255, 0.13) 0%,
          rgba(255, 55, 140, 0.07) 35%,
          transparent 72%
        );

      transform: translate(-50%, -50%) scale(0.88);
      filter: blur(14px);
      opacity: 0;

      animation:
        glowAppear 900ms ease 180ms forwards,
        glowBreathe 3s ease-in-out 1.1s infinite;
    }

    .loading-message {
      position: absolute;
      left: 50%;
      bottom: max(50px, env(safe-area-inset-bottom));

      transform: translateX(-50%) translateY(8px);

      color: rgba(255, 255, 255, 0.44);

      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      white-space: nowrap;

      opacity: 0;

      animation: messageAppear 800ms ease 450ms forwards;
    }

    @keyframes starsAppear {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes glowAppear {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.88);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes glowBreathe {
      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }

      50% {
        transform: translate(-50%, -50%) scale(1.08);
        opacity: 1;
      }
    }

    @keyframes messageAppear {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #stars,
      .ambient-glow,
      .loading-message {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div id="flutter-loading">

    <canvas id="stars"></canvas>

    <div class="ambient-glow"></div>

    <div class="loading-message">
      FOR NURSAULE
    </div>

  </div>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];
    let animationFrameId = null;

    function createStars() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      const count = Math.min(
        85,
        Math.max(
          42,
          Math.floor((width * height) / 11000)
        )
      );

      stars = [];

      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.15 + 0.25,
          opacity: Math.random() * 0.45 + 0.12,
          speed: Math.random() * 0.0012 + 0.00045,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function resizeCanvas() {
      const ratio = Math.min(
        window.devicePixelRatio || 1,
        2
      );

      const width = window.innerWidth;
      const height = window.innerHeight;

      canvas.width = width * ratio;
      canvas.height = height * ratio;

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      ctx.setTransform(
        ratio,
        0,
        0,
        ratio,
        0,
        0
      );

      createStars();
    }

    function drawStars(time) {
      const width = window.innerWidth;
      const height = window.innerHeight;

      ctx.clearRect(0, 0, width, height);

      for (const star of stars) {
        const pulse =
          Math.sin(time * star.speed + star.phase) * 0.18;

        const opacity = Math.max(
          0.06,
          Math.min(0.75, star.opacity + pulse)
        );

        ctx.beginPath();

        ctx.arc(
          star.x,
          star.y,
          star.radius,
          0,
          Math.PI * 2
        );

        ctx.fillStyle =
          `rgba(255, 255, 255, ${opacity})`;

        ctx.fill();
      }

      animationFrameId =
        requestAnimationFrame(drawStars);
    }

    resizeCanvas();

    window.addEventListener(
      "resize",
      resizeCanvas
    );

    animationFrameId =
      requestAnimationFrame(drawStars);

    window.addEventListener(
      "flutter-first-frame",
      function () {
        const loading =
          document.getElementById("flutter-loading");

        if (!loading) return;

        requestAnimationFrame(function () {
          loading.classList.add("hidden");
        });

        setTimeout(function () {
          if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
          }

          window.removeEventListener(
            "resize",
            resizeCanvas
          );

          loading.remove();
        }, 750);
      }
    );
  </script>

  <script
    src="flutter_bootstrap.js"
    async
  ></script>

</body>
</html>
