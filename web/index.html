<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <meta
    name="description"
    content="Специальное приложение для Нурсауле ❤️"
  >

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <meta
    name="apple-mobile-web-app-title"
    content="N❤️B"
  >

  <meta
    name="theme-color"
    content="#02040D"
  >

  <link
    rel="apple-touch-icon"
    href="icons/Icon-192.png?v=5"
  >

  <link
    rel="icon"
    type="image/png"
    href="favicon.png?v=5"
  >

  <link
    rel="manifest"
    href="manifest.json?v=5"
  >

  <title>N❤️B</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #02040d;
    }

    body {
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    #flutter-loading {
      position: fixed;
      inset: 0;
      z-index: 999999;

      display: flex;
      align-items: center;
      justify-content: center;

      width: 100%;
      height: 100%;
      min-height: 100dvh;

      overflow: hidden;
      background: #02040d;

      opacity: 1;

      transition:
        opacity 650ms ease,
        visibility 650ms ease;
    }

    #flutter-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-glow {
      position: absolute;

      width: 330px;
      height: 330px;

      border-radius: 50%;

      background:
        radial-gradient(
          circle,
          rgba(178, 72, 255, 0.15) 0%,
          rgba(255, 51, 133, 0.08) 38%,
          transparent 72%
        );

      filter: blur(10px);

      animation: glowPulse 2.7s ease-in-out infinite;
    }

    #stars {
      position: absolute;
      inset: 0;

      width: 100%;
      height: 100%;

      pointer-events: none;
    }

    .loading-content {
      position: relative;
      z-index: 3;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      transform: translateY(-8px);
    }

    .loading-logo {
      width: clamp(128px, 36vw, 158px);
      height: clamp(128px, 36vw, 158px);

      object-fit: contain;

      animation: logoBreathe 2.2s ease-in-out infinite;

      filter:
        drop-shadow(0 0 16px rgba(255, 77, 154, 0.18))
        drop-shadow(0 0 36px rgba(160, 74, 255, 0.13));
    }

    .loading-text {
      margin-top: 18px;

      color: rgba(255, 255, 255, 0.84);

      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2.4px;

      opacity: 0;

      animation: textAppear 1.1s ease 350ms forwards;
    }

    @keyframes logoBreathe {
      0%,
      100% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.025);
        opacity: 0.96;
      }
    }

    @keyframes glowPulse {
      0%,
      100% {
        transform: scale(0.95);
        opacity: 0.72;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    @keyframes textAppear {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div id="flutter-loading">

    <canvas id="stars"></canvas>

    <div class="loading-glow"></div>

    <div class="loading-content">

      <img
        class="loading-logo"
        src="icons/Icon-512.png?v=5"
        alt="N♥B"
      >

      <div class="loading-text">
        FOR NURSAULE
      </div>

    </div>

  </div>

  <script>
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    let stars = [];
    let animationFrame;

    function resizeCanvas() {
      const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = window.innerWidth * pixelRatio;
      canvas.height = window.innerHeight * pixelRatio;

      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";

      ctx.setTransform(
        pixelRatio,
        0,
        0,
        pixelRatio,
        0,
        0
      );

      createStars();
    }

    function createStars() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      const amount = Math.min(
        90,
        Math.max(
          45,
          Math.floor((width * height) / 10000)
        )
      );

      stars = [];

      for (let i = 0; i < amount; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 1.3 + 0.25,
          opacity: Math.random() * 0.55 + 0.15,
          speed: Math.random() * 0.008 + 0.003,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function drawStars(time) {
      ctx.clearRect(
        0,
        0,
        window.innerWidth,
        window.innerHeight
      );

      for (const star of stars) {
        const pulse =
          Math.sin(time * star.speed + star.phase) * 0.22;

        const opacity = Math.max(
          0.08,
          Math.min(0.9, star.opacity + pulse)
        );

        ctx.beginPath();

        ctx.arc(
          star.x,
          star.y,
          star.radius,
          0,
          Math.PI * 2
        );

        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.fill();
      }

      animationFrame = requestAnimationFrame(drawStars);
    }

    resizeCanvas();

    window.addEventListener("resize", resizeCanvas);

    animationFrame = requestAnimationFrame(drawStars);

    window.addEventListener(
      "flutter-first-frame",
      function () {
        const loading =
          document.getElementById("flutter-loading");

        if (!loading) return;

        loading.classList.add("hidden");

        setTimeout(function () {
          cancelAnimationFrame(animationFrame);
          window.removeEventListener(
            "resize",
            resizeCanvas
          );

          loading.remove();
        }, 700);
      }
    );
  </script>

  <script
    src="flutter_bootstrap.js"
    async
  ></script>

</body>
</html>
